<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablece tu contraseña</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
      background-color: #fdf6f9;
      color: #271c22;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(236, 72, 153, 0.08);
      border: 1px solid #f0dde7;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ec4899, #fb7185);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 28px; height: 28px; }
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #ec4899;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #ec4899, #fb7185);
      color: #ffffff !important;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: 40px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #999;
    }
    .footer a { color: #ec4899; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body { background-color: #17121a; color: #f6f0f4; }
      .card { background: #221a24; border-color: #3a2d38; }
      p { color: #ccc; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="white"/>
        </svg>
      </div>
      <h1>Restablece tu contraseña</h1>
      <p>Recibimos una solicitud para restablecer la contraseña de tu cuenta. Haz clic en el botón para crear una nueva.</p>
      <a class="btn" href="{{ .ConfirmationURL }}">Restablecer contraseña</a>
      <div class="footer">
        <p>Si no solicitaste esto, ignora este mensaje. Tu contraseña no cambiará.</p>
        <p><a href="{{ .SiteURL }}">Link x Link</a></p>
      </div>
    </div>
  </div>
</body>
</html>
