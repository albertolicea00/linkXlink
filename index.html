<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Conecta con personas locales por WhatsApp" />
    <meta name="theme-color" content="#6c47ff" />
    <title>Link x Link</title>
    <script>
      // Resolve theme before first paint to avoid a light/dark flash.
      ;(function () {
        var t = localStorage.getItem('lxl_theme')
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.dataset.theme = t
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
