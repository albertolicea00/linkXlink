<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Link x Link — Conecta por WhatsApp con personas locales</title>
    <meta
      name="description"
      content="Descubre perfiles de personas cercanas y contáctalas directo por WhatsApp. Sin registros, sin complicaciones. Perfiles locales verificados por la comunidad."
    />
    <meta name="theme-color" content="#ec4899" />
    <link rel="canonical" href="https://linksxlinksnetlify.app/" />
    <link
      rel="alternate"
      hreflang="es"
      href="https://linksxlinksnetlify.app/es"
    />
    <link
      rel="alternate"
      hreflang="en"
      href="https://linksxlinksnetlify.app/en"
    />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://linksxlinksnetlify.app/"
    />

    <!-- Open Graph (WhatsApp/Facebook link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Link x Link" />
    <meta
      property="og:title"
      content="Link x Link — Conecta por WhatsApp con personas locales"
    />
    <meta
      property="og:description"
      content="Descubre perfiles de personas cercanas y contáctalas directo por WhatsApp. Sin registros, sin complicaciones."
    />
    <meta property="og:url" content="https://linksxlinksnetlify.app/" />
    <meta property="og:image" content="https://linksxlinksnetlify.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Link x Link — Conecta por WhatsApp con personas locales"
    />
    <meta
      name="twitter:description"
      content="Descubre perfiles de personas cercanas y contáctalas directo por WhatsApp."
    />
    <meta
      name="twitter:image"
      content="https://linksxlinksnetlify.app/og.png"
    />

    <link
      rel="preload"
      href="/fonts/fredoka-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Link x Link",
        "url": "https://linksxlinksnetlify.app/",
        "description": "Perfiles de personas locales con contacto directo por WhatsApp.",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Web",
        "inLanguage": ["es", "en"],
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <script>
      // Resolve theme before first paint to avoid a light/dark flash.
      (function () {
        var t = localStorage.getItem("lxl_theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
